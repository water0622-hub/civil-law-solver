<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>民法解答神器 - 國考/特考必備</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: #f3f4f6; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 載入動畫 */
        .typing-dot {
            animation: typing 1.4s infinite ease-in-out;
            fill: currentColor;
        }
        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // API Key 必須保持為空字串，由執行環境自動注入，否則會導致 404 (找不到預覽版模型) 錯誤
        const apiKey = ""; 

        // 預設建議問題
        const suggestedQuestions = [
            "甲今年16歲，拿壓歲錢去機車行買了一台10萬元的機車，請問契約有效嗎？",
            "員工開車送貨時不小心撞傷路人，老闆需要連帶賠償嗎？",
            "簽約賣房子，結果交屋前遇到大地震房子倒了，買家還要付錢嗎？",
            "請問死亡宣告的要件跟年限是什麼？",
            "什麼是「無權代理」？跟「無權處分」差在哪裡？"
        ];

        // 圖示組件
        const Icons = {
            Bot: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></svg>,
            User: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Send: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
            Scale: () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 16l3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M2 16l3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h18"/></svg>,
            BookOpen: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
            Target: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
            Lightbulb: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>,
            AlertTriangle: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
            Key: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4l-4 4Z"/><path d="m2 22 7.1-7.1a5.8 5.8 0 1 0-4.2-4.2L2 18v4h4v-2Z"/></svg>,
            X: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        };

        // 具備 Exponential Backoff 的 Fetch 函數
        const fetchWithRetry = async (url, options, retries = 5) => {
            let delay = 1000;
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        // 針對 400/401/403/404 等用戶端錯誤，直接拋出例外不進行重試
                        if (response.status === 400 || response.status === 401 || response.status === 403 || response.status === 404) {
                            throw new Error(`HTTP error! status: ${response.status}`);
                        }
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return await response.json();
                } catch (e) {
                    // 若是最後一次重試或是遇到 400/401/403/404，則不再重試
                    if (i === retries - 1 || e.message.includes('400') || e.message.includes('401') || e.message.includes('403') || e.message.includes('404')) {
                        throw e;
                    }
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
            }
        };

        const App = () => {
            const [input, setInput] = useState('');
            const [messages, setMessages] = useState([
                { 
                    sender: 'bot', 
                    text: '你好！我是搭載 AI 的「民法解答神器」。\n您可以輸入任何民法觀念或實例題，我會自動為您分析案情、用白話文解釋，並為您標示適用的民法條文與國考解題秘訣！',
                    isWelcome: true
                }
            ]);
            const [isTyping, setIsTyping] = useState(false);

            // 新增 API Key 狀態管理
            const [savedApiKey, setSavedApiKey] = useState(() => localStorage.getItem('gemini_api_key') || '');
            const [showSettings, setShowSettings] = useState(false);
            const [tempKey, setTempKey] = useState('');

            const messagesEndRef = useRef(null);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages, isTyping]);

            // 呼叫 Gemini AI 取得解答
            const generateAnswer = async (query) => {
                // 關鍵修正：系統環境的攔截器需要「完全吻合」的字串寫法。
                // 若無自訂 Key，我們必須精確使用預設的 URL 格式，以觸發環境的自動金鑰注入。
                // 若有自訂 Key，則切換至一般的公開模型 gemini-2.5-flash。
                let url = "";
                if (savedApiKey) {
                    url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${savedApiKey}`;
                } else {
                    url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                }
                
                const payload = {
                    systemInstruction: {
                        parts: [{ 
                            text: `你是一位台灣民法考試（國家考試、特考、轉學考）的超強補教名師。
                            請依據台灣《民法》最新規定解答。
                            
                            你的任務是幫助考生「秒懂」並「快速記憶」。
                            請務必遵守以下答題風格：
                            1. 白話解析必須「極度精簡」、「精確簡短」，最好能用 1~3 句話直接切中要害。
                            2. 善用「條列式」、「箭頭 (→)」或「公式」來拆解法律關係。
                            3. 針對考點給出明確結論（例如：有效、無效、效力未定）。
                            4. 必須提供一段「精確解答」，這是專門給考生寫在考卷上拿分的標準法律用語與重點寫法。
                            
                            必須輸出 JSON 格式，包含以下五個欄位：
                            1. title: 核心考點主題（如：無權代理、188條僱用人責任）
                            2. explanation: 極精簡的白話解析與結論（方便考生背誦的短句）
                            3. precise_answer: 精確解答（考試容易拿分的重點寫法，適合直接寫在申論題或選擇題上）
                            4. articles: 適用法條（如：民法第 188 條）
                            5. tips: 考試秘訣（給出口訣、常考陷阱或秒殺解題技巧）` 
                        }]
                    },
                    contents: [{ parts: [{ text: query }] }],
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "OBJECT",
                            properties: {
                                title: { type: "STRING" },
                                explanation: { type: "STRING" },
                                precise_answer: { type: "STRING" },
                                articles: { type: "STRING" },
                                tips: { type: "STRING" }
                            },
                            required: ["title", "explanation", "precise_answer", "articles", "tips"]
                        }
                    }
                };

                try {
                    const result = await fetchWithRetry(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!text) throw new Error("API 回傳格式異常");
                    
                    return { success: true, data: JSON.parse(text) };
                } catch (error) {
                    console.error("API Error:", error);
                    return { success: false, error: error.message };
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!input.trim()) return;

                const userText = input.trim();
                setMessages(prev => [...prev, { sender: 'user', text: userText }]);
                setInput('');
                setIsTyping(true);

                const response = await generateAnswer(userText);
                
                setIsTyping(false);
                
                if (response && response.success) {
                    setMessages(prev => [...prev, { sender: 'bot', data: response.data }]);
                } else {
                    let errorText = '抱歉，目前系統繁忙或遭遇網路錯誤。請稍後再試一次，或換個方式描述您的問題！';
                    
                    if (response?.error) {
                        if (response.error.includes('400')) {
                            errorText = '請先設定您的 Gemini API Key 才能開始使用 AI 解析功能喔！\n\n💡 點擊右上角的「鑰匙」圖示即可設定金鑰。您可以前往 Google AI Studio 免費申請。';
                        } else if (response.error.includes('404')) {
                            errorText = `抱歉，系統無法找到指定的 AI 模型 (${response.error})。\n\n💡 提示：請確保您使用的 API Key 具有存取該模型的權限。`;
                        } else if (response.error.includes('401') || response.error.includes('403')) {
                            errorText = `抱歉，系統無法驗證 API 金鑰 (${response.error})。\n\n💡 提示：您的 API Key 可能不正確或已失效，請點擊右上角「鑰匙」圖示重新設定。`;
                        } else {
                            errorText = `抱歉，發生連線錯誤：${response.error}。請稍後再試一次。`;
                        }
                    }

                    setMessages(prev => [...prev, { 
                        sender: 'bot', 
                        isError: true,
                        text: errorText 
                    }]);
                }
            };

            const handleSuggestionClick = (question) => {
                setInput(question);
            };

            const handleOpenSettings = () => {
                setTempKey(savedApiKey);
                setShowSettings(true);
            };

            const handleSaveKey = () => {
                const keyToSave = tempKey.trim();
                localStorage.setItem('gemini_api_key', keyToSave);
                setSavedApiKey(keyToSave);
                setShowSettings(false);
            };

            return (
                <div className="flex flex-col h-screen max-w-4xl mx-auto bg-white shadow-xl overflow-hidden relative">
                    {/* Header */}
                    <div className="bg-slate-800 text-white p-4 flex items-center justify-between shadow-md z-10">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-600 p-2 rounded-lg shadow-inner border border-blue-500">
                                <Icons.Scale />
                            </div>
                            <div>
                                <h1 className="font-bold text-xl tracking-wider">民法解答神器</h1>
                                <p className="text-xs text-blue-200">AI 智能解析 ╳ 國考/特考必備</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className="hidden md:flex items-center gap-2 text-xs font-medium bg-slate-700 px-3 py-1.5 rounded-full border border-slate-600">
                                <span className={`w-2 h-2 rounded-full ${savedApiKey || apiKey === "" ? 'bg-green-400 animate-pulse' : 'bg-red-400'}`}></span>
                                {savedApiKey || apiKey === "" ? 'AI 已就緒' : '未設定金鑰'}
                            </div>
                            <button 
                                onClick={handleOpenSettings}
                                className="p-2 bg-slate-700 hover:bg-slate-600 rounded-lg border border-slate-600 transition-colors flex items-center justify-center text-slate-200 hover:text-white"
                                title="設定 API Key"
                            >
                                <Icons.Key />
                            </button>
                        </div>
                    </div>

                    {/* Settings Modal */}
                    {showSettings && (
                        <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden animate-in fade-in zoom-in duration-200">
                                <div className="bg-slate-50 border-b border-slate-100 p-4 flex items-center justify-between">
                                    <h2 className="font-bold text-slate-800 flex items-center gap-2">
                                        <Icons.Key /> 設定 Gemini API Key
                                    </h2>
                                    <button onClick={() => setShowSettings(false)} className="text-slate-400 hover:text-slate-600 transition-colors">
                                        <Icons.X />
                                    </button>
                                </div>
                                <div className="p-6 space-y-4">
                                    <p className="text-sm text-slate-600 leading-relaxed">
                                        本應用程式需要 Gemini API Key 才能進行 AI 智慧解析。您的金鑰將<strong className="text-blue-600">只會儲存在目前的瀏覽器中</strong>，不會上傳至任何其他伺服器。
                                    </p>
                                    <div className="space-y-2">
                                        <label className="text-sm font-semibold text-slate-700 block">API Key</label>
                                        <input 
                                            type="password" 
                                            value={tempKey}
                                            onChange={(e) => setTempKey(e.target.value)}
                                            placeholder="AIzaSy..."
                                            className="w-full bg-slate-50 border border-slate-200 focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 rounded-xl px-4 py-3 outline-none transition-all text-sm font-mono"
                                        />
                                    </div>
                                    <p className="text-xs text-slate-500">
                                        還沒有金鑰嗎？請前往 <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noreferrer" className="text-blue-600 hover:underline">Google AI Studio</a> 免費申請。
                                    </p>
                                </div>
                                <div className="bg-slate-50 border-t border-slate-100 p-4 flex justify-end gap-2">
                                    <button 
                                        onClick={() => setShowSettings(false)}
                                        className="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-200 rounded-xl transition-colors"
                                    >
                                        取消
                                    </button>
                                    <button 
                                        onClick={handleSaveKey}
                                        className="px-6 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white rounded-xl transition-colors shadow-sm"
                                    >
                                        儲存設定
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Chat Area */}
                    <div className="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 bg-slate-50">
                        {messages.map((msg, index) => (
                            <div key={index} className={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                                {msg.sender === 'bot' && (
                                    <div className={`w-9 h-9 rounded-full flex items-center justify-center mr-3 mt-1 flex-shrink-0 shadow-sm border ${msg.isError ? 'bg-red-100 text-red-600 border-red-200' : 'bg-slate-800 text-white border-slate-700'}`}>
                                        {msg.isError ? <Icons.AlertTriangle /> : <Icons.Bot />}
                                    </div>
                                )}
                                
                                <div className={`max-w-[90%] md:max-w-[80%] rounded-2xl p-4 shadow-sm ${
                                    msg.sender === 'user' 
                                    ? 'bg-blue-600 text-white rounded-tr-none' 
                                    : msg.isError
                                        ? 'bg-red-50 border border-red-100 text-red-800 rounded-tl-none'
                                        : 'bg-white border border-slate-200 text-slate-800 rounded-tl-none'
                                }`}>
                                    
                                    {/* 一般文字訊息 */}
                                    {msg.text && (
                                        <div className="whitespace-pre-wrap leading-relaxed">
                                            {msg.text}
                                        </div>
                                    )}

                                    {/* 歡迎訊息下的建議按鈕 */}
                                    {msg.isWelcome && (
                                        <div className="mt-5 space-y-2">
                                            <p className="text-sm font-bold text-slate-500 mb-3 flex items-center gap-1 border-b pb-2">
                                                <Icons.Lightbulb /> 點擊下方範例直接發問：
                                            </p>
                                            {suggestedQuestions.map((q, idx) => (
                                                <button 
                                                    key={idx}
                                                    onClick={() => handleSuggestionClick(q)}
                                                    className="block w-full text-left text-sm bg-slate-100/80 hover:bg-blue-50 text-slate-700 hover:text-blue-700 py-2.5 px-4 rounded-xl transition-all border border-transparent hover:border-blue-200"
                                                >
                                                    {q}
                                                </button>
                                            ))}
                                        </div>
                                    )}

                                    {/* 結構化解答區塊 */}
                                    {msg.data && (
                                        <div className="space-y-5">
                                            <h3 className="font-bold text-lg md:text-xl text-slate-800 border-b-2 border-blue-100 pb-2">
                                                {msg.data.title}
                                            </h3>
                                            
                                            <div>
                                                <h4 className="text-sm font-bold text-slate-500 mb-2 flex items-center gap-1">
                                                    白話解析
                                                </h4>
                                                <p className="leading-relaxed text-slate-700 text-[15px] text-justify whitespace-pre-wrap">
                                                    {msg.data.explanation}
                                                </p>
                                            </div>

                                            <div className="bg-emerald-50/80 rounded-xl p-3.5 border border-emerald-100">
                                                <h4 className="text-sm font-bold text-emerald-800 mb-1.5 flex items-center gap-1.5">
                                                    <Icons.Target /> 精確解答 (考試拿分寫法)
                                                </h4>
                                                <p className="text-emerald-900 text-[15px] leading-relaxed whitespace-pre-wrap">
                                                    {msg.data.precise_answer}
                                                </p>
                                            </div>
                                            
                                            <div className="bg-blue-50/80 rounded-xl p-3.5 border border-blue-100">
                                                <h4 className="text-sm font-bold text-blue-800 mb-1.5 flex items-center gap-1.5">
                                                    <Icons.BookOpen /> 適用法條
                                                </h4>
                                                <p className="text-blue-900 font-medium tracking-wide">
                                                    {msg.data.articles}
                                                </p>
                                            </div>

                                            <div className="bg-amber-50/80 rounded-xl p-3.5 border border-amber-100">
                                                <h4 className="text-sm font-bold text-amber-800 mb-1.5 flex items-center gap-1.5">
                                                    <Icons.Lightbulb /> 考試秘訣
                                                </h4>
                                                <p className="text-amber-900 text-[15px] leading-relaxed">
                                                    {msg.data.tips.replace('【考試秘訣】', '').replace('【解題技巧】', '')}
                                                </p>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                {msg.sender === 'user' && (
                                    <div className="w-9 h-9 rounded-full bg-blue-100 text-blue-600 border border-blue-200 flex items-center justify-center ml-3 mt-1 flex-shrink-0 shadow-sm">
                                        <Icons.User />
                                    </div>
                                )}
                            </div>
                        ))}

                        {/* 正在輸入動畫 */}
                        {isTyping && (
                            <div className="flex justify-start">
                                <div className="w-9 h-9 rounded-full bg-slate-800 text-white flex items-center justify-center mr-3 mt-1 flex-shrink-0 shadow-sm">
                                    <Icons.Bot />
                                </div>
                                <div className="bg-white border border-slate-200 rounded-2xl rounded-tl-none px-5 py-4 flex items-center gap-1 shadow-sm">
                                    <svg height="10" width="36" className="text-blue-500">
                                        <circle cx="6" cy="5" r="3" className="typing-dot" />
                                        <circle cx="18" cy="5" r="3" className="typing-dot" />
                                        <circle cx="30" cy="5" r="3" className="typing-dot" />
                                    </svg>
                                    <span className="text-xs text-slate-400 ml-2 font-medium">AI 檢索法條中...</span>
                                </div>
                            </div>
                        )}
                        <div ref={messagesEndRef} />
                    </div>

                    {/* Input Area */}
                    <div className="bg-white border-t border-slate-200 p-4 md:p-5 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-10">
                        <form onSubmit={handleSubmit} className="flex gap-2 max-w-3xl mx-auto relative">
                            <input
                                type="text"
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                placeholder="輸入民法問題、關鍵字或情境題..."
                                disabled={isTyping}
                                className="flex-1 bg-slate-100 border-transparent focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 rounded-2xl px-5 py-3.5 outline-none transition-all shadow-inner disabled:bg-slate-50 disabled:text-slate-400 text-[15px]"
                            />
                            <button 
                                type="submit"
                                disabled={!input.trim() || isTyping}
                                className="bg-blue-600 hover:bg-blue-700 disabled:bg-slate-200 disabled:text-slate-400 text-white rounded-2xl px-6 py-3.5 flex items-center justify-center transition-all shadow-sm active:scale-95"
                            >
                                <Icons.Send />
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
